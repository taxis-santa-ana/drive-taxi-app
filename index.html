<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drive Taxi SA</title>
    
    <!-- PWA CONFIG -->
    <meta name="theme-color" content="#3366FF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="1535791.png">
    <link rel="apple-touch-icon" href="1535791.png">

    <!-- Firebase & Leaflet -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --waze-blue: #3366FF; 
            --waze-baby: #B2D8FF;
            --dark: #202124; 
            --green: #00D37F; 
            --white: #FFFFFF;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #F2F4F7; 
            margin: 0; 
            color: var(--dark);
            -webkit-tap-highlight-color: transparent;
        }

        .card { 
            background: var(--white); 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            margin: 15px;
            border: 1px solid #E9EDF0;
        }

        #map-user, #map-driver { 
            height: 380px; 
            width: 100%; 
            border-radius: 20px; 
            margin-bottom: 15px; 
            z-index: 1;
            border: 1px solid #ddd;
        }

        input {
            width: 100%;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 16px;
            border: 2px solid #E9EDF0;
            font-size: 18px;
            box-sizing: border-box;
            outline: none;
        }

        button { 
            width: 100%; 
            padding: 20px; 
            border-radius: 20px; 
            border: none; 
            background: var(--waze-blue); 
            color: white;
            font-weight: bold; 
            cursor: pointer; 
            font-size: 18px; 
            margin-top: 10px; 
            box-shadow: 0 4px 12px rgba(51, 102, 255, 0.2);
        }

        button:active { transform: scale(0.98); }
        .hidden { display: none !important; }
        .btn-outline { background: #E9EDF0; color: var(--dark); box-shadow: none; }
        
        .info-bubble {
            background: var(--waze-baby);
            padding: 15px;
            border-radius: 16px;
            font-size: 15px;
            margin-bottom: 15px;
            color: #003366;
            text-align: center;
        }

        .header-bar { 
            background: var(--white); 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #E9EDF0;
        }

        .logo-main {
            width: 130px;
            height: 130px;
            margin-bottom: 20px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- PANTALLA DE INICIO -->
        <div id="screen-start" style="text-align:center; padding-top:60px;">
            <img src="1535791.png" class="logo-main" alt="Logo Drive Taxi">
            <h1 style="font-weight: 800;">Drive Taxi SA</h1>
            <div style="padding: 20px;">
                <button onclick="initUserFlow()">PEDIR UN VIAJE</button>
                <button onclick="loginConductor()" class="btn-outline" style="margin-top:20px;">MODO CONDUCTOR</button>
            </div>
        </div>

        <!-- FLUJO USUARIO -->
        <div id="screen-user" class="hidden">
            <div class="card">
                <h2 id="step-title" style="margin:0 0 10px 0;">📍 Ubicación</h2>
                <div id="map-user"></div>
                <div id="route-info" class="info-bubble">Toca el mapa para marcar el origen</div>
                
                <input type="text" id="u-nombre" placeholder="Tu Nombre">
                <input type="number" id="u-oferta" placeholder="Tu Oferta ($)">
                
                <button id="btn-next" onclick="toggleSelectionMode()">SIGUIENTE: DESTINO</button>
                <button id="btn-send" onclick="enviarPedidoConMapa()" class="hidden" style="background:var(--green);">SOLICITAR AHORA</button>
                <button onclick="location.reload()" class="btn-outline">VOLVER</button>
            </div>
        </div>

        <!-- PANTALLA DE ESPERA -->
        <div id="screen-wait" class="hidden">
            <div class="card" style="text-align:center;">
                <div class="info-bubble">🚕 Buscando conductor...</div>
                <h2 id="u-status">Esperando...</h2>
                <button onclick="cancelarPedido()" style="background:#FF4B4B; margin-top:20px;">CANCELAR</button>
            </div>
        </div>

        <!-- PANEL CONDUCTOR -->
        <div id="screen-driver" class="hidden">
            <div class="header-bar">
                <span style="font-weight:bold;">Conductor: <span id="d-label" style="color:var(--waze-blue);"></span></span>
                <button onclick="cerrarSesion()" style="width:auto; padding:10px; font-size:12px; margin:0; background:#FF4B4B;">SALIR</button>
            </div>
            <div id="d-pedidos"></div>
            <div id="d-viaje-activo" class="hidden">
                <div class="card">
                    <h3>Viaje en Curso</h3>
                    <div id="map-driver"></div>
                    <button onclick="abrirNavegadorApp()">NAVEGAR (MAPS)</button>
                    <div id="d-controles" style="margin-top:10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDgIX4jKwyQcfaTSP0QXAdIAR7UzrQMK3g",
            authDomain: "drive-taxi-baad8.firebaseapp.com",
            databaseURL: "https://drive-taxi-baad8-default-rtdb.firebaseio.com",
            projectId: "drive-taxi-baad8",
            storageBucket: "drive-taxi-baad8.firebasestorage.app",
            appId: "1:308551715355:web:e802500e252893be8c86be"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let mapU, mapD, markerOri, markerDes;
        let coordsOri = null, coordsDes = null;
        let selectionMode = 'origen';
        let currentTripId = null;

        function showScreen(id) {
            document.querySelectorAll('#app > div').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // LOGIN CONDUCTOR ACTUALIZADO
        function loginConductor() {
            const user = prompt("Usuario:");
            if (user === "Administrador") {
                const pass = prompt("Contraseña:");
                if (pass === "Taber2026%") {
                    localStorage.setItem('taxi_session', 'active');
                    initDriverPanel();
                } else { alert("Error de credenciales"); }
            } else if (user !== null) { alert("Usuario no reconocido"); }
        }

        function initUserFlow() {
            showScreen('screen-user');
            if (!mapU) {
                mapU = L.map('map-user', {zoomControl: false}).setView([13.97, -89.56], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapU);
                mapU.on('click', e => {
                    if (selectionMode === 'origen') {
                        coordsOri = e.latlng;
                        if (markerOri) mapU.removeLayer(markerOri);
                        markerOri = L.marker(coordsOri).addTo(mapU);
                    } else {
                        coordsDes = e.latlng;
                        if (markerDes) mapU.removeLayer(markerDes);
                        markerDes = L.marker(coordsDes).addTo(mapU);
                    }
                });
            }
        }

        function toggleSelectionMode() {
            if (!coordsOri) return alert("Marca el origen en el mapa");
            selectionMode = 'destino';
            document.getElementById('step-title').innerText = "🏁 Destino";
            document.getElementById('route-info').innerText = "Marca ahora a dónde vas";
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('btn-send').classList.remove('hidden');
        }

        function enviarPedidoConMapa() {
            const nom = document.getElementById('u-nombre').value;
            const ofe = document.getElementById('u-oferta').value;
            if(!nom || !ofe || !coordsDes) return alert("Faltan datos");
            currentTripId = "ID-" + Date.now();
            db.ref('viajes/' + currentTripId).set({
                cliente: nom, oferta: ofe, estado: 'buscando',
                latOri: coordsOri.lat, lngOri: coordsOri.lng,
                latDes: coordsDes.lat, lngDes: coordsDes.lng
            });
            showScreen('screen-wait');
        }

        function initDriverPanel() {
            showScreen('screen-driver');
            document.getElementById('d-label').innerText = "Administrador";
            db.ref('viajes').on('value', snap => {
                const list = document.getElementById('d-pedidos');
                list.innerHTML = "";
                snap.forEach(child => {
                    const v = child.val();
                    if(v.estado === 'buscando') {
                        list.innerHTML += `<div class="card">
                            <p>👤 <b>${v.cliente}</b> ofrece <b>$${v.oferta}</b></p>
                            <button onclick="aceptarViaje('${child.key}')">ACEPTAR</button>
                        </div>`;
                    }
                });
            });
        }

        function aceptarViaje(id) {
            db.ref('viajes/' + id).update({ estado: 'aceptado', cond: 'Administrador' });
            alert("Viaje aceptado");
        }

        function cerrarSesion() { localStorage.clear(); location.reload(); }
        function cancelarPedido() { db.ref('viajes/' + currentTripId).remove(); location.reload(); }
    </script>
</body>
</html>
