<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver Santa Ana</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

    <style>
        :root { --waze-blue: #3366FF; --dark: #202124; --green: #00D37F; --white: #FFFFFF; --red: #FF4B4B; --yellow: #FFC107; }
        body { font-family: 'Segoe UI', sans-serif; background: #F2F4F7; margin: 0; color: var(--dark); overflow-x: hidden; }
        .card { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin: 15px; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--waze-blue); color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .hidden { display: none !important; }
        .btn-cancel { background: var(--red); margin-top: 10px; }
        .chat-box { height: 250px; overflow-y: auto; background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .msg { margin: 5px 0; padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--waze-blue); color: white; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #e9ecef; color: #333; border-bottom-left-radius: 4px; }
        .profile-img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 3px solid var(--green); }
    </style>
</head>
<body onload="initApp()">

    <div id="app">
        <!-- PANTALLA INICIAL -->
        <div id="screen-start" style="text-align:center; padding-top:80px;">
            <h1 style="font-weight: 800; font-size: 35px; margin-bottom: 5px;">Driver Santa Ana</h1>
            <p style="color: #666; margin-bottom: 40px;">Rápido • Seguro • Local</p>
            <div style="padding: 20px;">
                <button onclick="showScreen('screen-user-form')">PEDIR UN VIAJE</button>
                <button onclick="showScreen('screen-login')" style="background:#E9EDF0; color:#202124; margin-top:15px;">SOY CONDUCTOR</button>
            </div>
        </div>

        <!-- FORMULARIO USUARIO -->
        <div id="screen-user-form" class="hidden">
            <div class="card">
                <h2 style="margin-top:0;">Nuevo Viaje</h2>
                <input type="text" id="u-nombre" placeholder="Tu nombre">
                <input type="text" id="u-origen" placeholder="¿Dónde estás?">
                <input type="text" id="u-destino" placeholder="¿A dónde vas?">
                <input type="number" id="u-oferta" placeholder="¿Cuánto ofreces? $">
                <button onclick="crearPedido()" style="background:var(--green);">BUSCAR CONDUCTORES</button>
                <button onclick="location.reload()" style="background:none; color:gray; margin-top:10px;">Volver</button>
            </div>
        </div>

        <!-- ESPERA Y CHAT USUARIO -->
        <div id="screen-user-wait" class="hidden">
            <div class="card">
                <div id="user-negotiation">
                    <h3 style="text-align:center; color: var(--waze-blue);">Buscando ofertas...</h3>
                    <div id="lista-ofertas-conductor"></div>
                </div>

                <div id="user-trip-active" class="hidden">
                    <div style="display:flex; align-items:center; gap:15px; border-bottom:1px solid #eee; padding-bottom:15px; margin-bottom:15px;">
                        <img id="u-view-foto" class="profile-img">
                        <div>
                            <b id="u-view-nombre" style="font-size:18px;"></b><br>
                            <span id="u-view-vehi" style="font-size:13px; color:#666;"></span>
                        </div>
                    </div>
                    <div id="chat-user" class="chat-box"></div>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="input-chat-user" placeholder="Escribe al conductor...">
                        <button onclick="enviarMensaje('user')" style="width:80px; padding:0;">Enviar</button>
                    </div>
                </div>
                <button onclick="cancelarTodo()" class="btn-cancel">CANCELAR</button>
            </div>
        </div>

        <!-- PANEL CONDUCTOR -->
        <div id="screen-driver" class="hidden">
            <div class="card" style="padding:10px 20px; display:flex; justify-content:space-between; align-items:center; background:var(--dark); color:white; border-radius:0; margin:0;">
                <span>Socio: <b id="d-label"></b></span>
                <button onclick="cerrarSesion()" style="width:auto; padding:5px 12px; font-size:12px; background:var(--red);">SALIR</button>
            </div>

            <div id="driver-available-list"></div>

            <div id="driver-trip-active" class="hidden card">
                <div style="background: #e8f5e9; padding:10px; border-radius:10px; margin-bottom:15px; font-size:14px;">
                    <b style="color:var(--green);">VIAJE EN CURSO</b><br>
                    <span id="d-view-cliente"></span><br>
                    <span id="d-view-ruta" style="color:#555;"></span>
                </div>
                <div id="chat-driver" class="chat-box"></div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="input-chat-driver" placeholder="Mensaje al cliente...">
                    <button onclick="enviarMensaje('driver')" style="width:80px; padding:0;">Enviar</button>
                </div>
                <button onclick="finalizarViaje()" style="background:var(--green); margin-top:20px;">MARCAR COMO COMPLETADO</button>
                <button onclick="cancelarYReasignar()" class="btn-cancel">CANCELAR VIAJE</button>
            </div>
        </div>

        <!-- LOGIN / REGISTRO -->
        <div id="screen-login" class="hidden">
            <div class="card">
                <h2>Acceso Conductores</h2>
                <input type="text" id="l-user" placeholder="Usuario">
                <input type="password" id="l-pass" placeholder="Contraseña">
                <button onclick="intentarLogin()">ENTRAR</button>
                <button onclick="showScreen('screen-register')" style="margin-top:10px; background:#eee; color:black;">REGISTRAR NUEVO SOCIO</button>
            </div>
        </div>

        <div id="screen-register" class="hidden">
            <div class="card">
                <h3>Registro de Socio</h3>
                <input type="text" id="r-nombre" placeholder="Nombre completo">
                <input type="text" id="r-user" placeholder="Usuario">
                <input type="password" id="r-pass" placeholder="Contraseña">
                <input type="text" id="r-placa" placeholder="Placa (Ej: P123-456)">
                <input type="text" id="r-modelo" placeholder="Modelo del Carro">
                <input type="text" id="r-color" placeholder="Color del Carro">
                <label style="font-size:12px; display:block; margin-bottom:5px;">Tu Foto (Perfil):</label>
                <input type="file" id="r-foto" accept="image/*">
                <button onclick="registrarConductor()">FINALIZAR REGISTRO</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDgIX4jKwyQcfaTSP0QXAdIAR7UzrQMK3g",
            authDomain: "drive-taxi-baad8.firebaseapp.com",
            databaseURL: "https://drive-taxi-baad8-default-rtdb.firebaseio.com",
            projectId: "drive-taxi-baad8",
            storageBucket: "drive-taxi-baad8.appspot.com",
            appId: "1:308551715355:web:e802500e252893be8c86be"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        let currentViajeId = localStorage.getItem('active_trip_id');
        let userData = null;

        function showScreen(id) {
            document.querySelectorAll('#app > div').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // --- INICIO Y PERSISTENCIA ---
        function initApp() {
            const driver = localStorage.getItem('driver_data');
            if(driver) {
                userData = JSON.parse(driver);
                initDriverPanel();
            } else if(currentViajeId) {
                showScreen('screen-user-wait');
                vincularViaje(currentViajeId);
            }
        }

        // --- FLUJO USUARIO ---
        function crearPedido() {
            const nombre = document.getElementById('u-nombre').value;
            const origen = document.getElementById('u-origen').value;
            const destino = document.getElementById('u-destino').value;
            const oferta = document.getElementById('u-oferta').value;

            if(!nombre || !oferta) return alert("Por favor llena los campos");

            currentViajeId = "VIAJE-" + Date.now();
            localStorage.setItem('active_trip_id', currentViajeId);
            
            db.ref('viajes/' + currentViajeId).set({
                cliente: nombre, origen: origen, destino: destino,
                oferta: oferta, estado: 'buscando', timestamp: Date.now()
            });

            showScreen('screen-user-wait');
            vincularViaje(currentViajeId);
        }

        function vincularViaje(id) {
            db.ref('viajes/' + id).on('value', snap => {
                const v = snap.val();
                if(!v) { 
                    cancelarTodo();
                    return;
                }

                const negDiv = document.getElementById('user-negotiation');
                const activeDiv = document.getElementById('user-trip-active');
                const lista = document.getElementById('lista-ofertas-conductor');

                if(v.estado === 'buscando') {
                    negDiv.classList.remove('hidden');
                    activeDiv.classList.add('hidden');
                    lista.innerHTML = "";
                    if(v.contraofertas) {
                        Object.keys(v.contraofertas).forEach(key => {
                            const co = v.contraofertas[key];
                            lista.innerHTML += `
                                <div class="card" style="border:2px solid var(--yellow);">
                                    <p><b>${co.nombre}</b> te lleva por <b>$${co.monto}</b></p>
                                    <button onclick="aceptarSocio('${id}', '${key}', '${co.monto}')" style="background:var(--green);">ACEPTAR TRATO</button>
                                </div>`;
                        });
                    }
                } else if(v.estado === 'aceptado') {
                    negDiv.classList.add('hidden');
                    activeDiv.classList.remove('hidden');
                    document.getElementById('u-view-nombre').innerText = v.conductorNombre;
                    document.getElementById('u-view-vehi').innerText = `${v.conductorAuto} • ${v.conductorPlaca}`;
                    document.getElementById('u-view-foto').src = v.conductorFoto;
                    iniciarChat(id);
                }
            });
        }

        function aceptarSocio(viajeId, driverId, precioFinal) {
            db.ref('conductores/' + driverId).once('value', s => {
                const d = s.val();
                db.ref('viajes/' + viajeId).update({
                    estado: 'aceptado',
                    oferta: precioFinal,
                    conductorId: driverId,
                    conductorNombre: d.nombre,
                    conductorAuto: d.modelo + " " + d.color,
                    conductorPlaca: d.placa,
                    conductorFoto: d.foto
                });
            });
        }

        // --- FLUJO CONDUCTOR ---
        function initDriverPanel() {
            showScreen('screen-driver');
            document.getElementById('d-label').innerText = userData.nombre;

            db.ref('viajes').on('value', snap => {
                const listDiv = document.getElementById('driver-available-list');
                const activeDiv = document.getElementById('driver-trip-active');
                let viajeActivo = null;

                const availableHTML = [];
                snap.forEach(child => {
                    const v = child.val();
                    if(v.estado === 'aceptado' && v.conductorId === userData.user) {
                        viajeActivo = { id: child.key, ...v };
                    } else if(v.estado === 'buscando') {
                        availableHTML.push(`
                            <div class="card">
                                <p><b>${v.cliente}</b> ($${v.oferta})</p>
                                <p style="font-size:12px; color:gray;">${v.origen} ➔ ${v.destino}</p>
                                <input type="number" id="ofert-${child.key}" placeholder="Tu precio $">
                                <button onclick="enviarPropuesta('${child.key}')" style="background:var(--yellow); color:black; margin-top:5px;">ENVIAR PROPUESTA</button>
                            </div>`);
                    }
                });

                if(viajeActivo) {
                    currentViajeId = viajeActivo.id;
                    listDiv.classList.add('hidden');
                    activeDiv.classList.remove('hidden');
                    document.getElementById('d-view-cliente').innerText = "Cliente: " + viajeActivo.cliente;
                    document.getElementById('d-view-ruta').innerText = viajeActivo.origen + " a " + viajeActivo.destino;
                    iniciarChat(viajeActivo.id);
                } else {
                    activeDiv.classList.add('hidden');
                    listDiv.classList.remove('hidden');
                    listDiv.innerHTML = availableHTML.join('') || "<p style='text-align:center; margin-top:20px;'>Buscando pedidos cerca...</p>";
                }
            });
        }

        function enviarPropuesta(viajeId) {
            const monto = document.getElementById('ofert-' + viajeId).value;
            if(!monto) return alert("Escribe un precio");
            db.ref('viajes/' + viajeId + '/contraofertas/' + userData.user).set({
                nombre: userData.nombre,
                monto: monto,
                user: userData.user
            }).then(() => alert("Oferta enviada!"));
        }

        // --- CHAT CENTRALIZADO ---
        function iniciarChat(id) {
            db.ref('viajes/' + id + '/chat').off(); // Limpiar previos
            db.ref('viajes/' + id + '/chat').on('value', snap => {
                const html = [];
                snap.forEach(msg => {
                    const m = msg.val();
                    html.push(`<div class="msg ${m.role === (userData ? 'driver' : 'user') ? 'me' : 'other'}">${m.text}</div>`);
                });
                const chatBox = userData ? document.getElementById('chat-driver') : document.getElementById('chat-user');
                if(chatBox) {
                    chatBox.innerHTML = html.join('');
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            });
        }

        function enviarMensaje(role) {
            const input = document.getElementById('input-chat-' + role);
            if(!input.value.trim()) return;
            db.ref('viajes/' + currentViajeId + '/chat').push({
                role: role,
                text: input.value,
                time: Date.now()
            });
            input.value = "";
        }

        // --- ACCIONES DE VIAJE ---
        function finalizarViaje() {
            db.ref('viajes/' + currentViajeId).remove();
            location.reload();
        }

        function cancelarYReasignar() {
            if(confirm("¿Cancelar este viaje? Volverá a estar disponible para otros.")) {
                db.ref('viajes/' + currentViajeId).update({
                    estado: 'buscando',
                    conductorId: null,
                    conductorNombre: null,
                    chat: null
                });
            }
        }

        function cancelarTodo() {
            if(currentViajeId) db.ref('viajes/' + currentViajeId).remove();
            localStorage.removeItem('active_trip_id');
            location.reload();
        }

        // --- AUTENTICACIÓN (Simplificada) ---
        async function registrarConductor() {
            const user = document.getElementById('r-user').value.toLowerCase();
            const file = document.getElementById('r-foto').files[0];
            if(!file || !user) return alert("Sube tu foto y elige usuario");

            const ref = storage.ref('socios/' + user);
            await ref.put(file);
            const url = await ref.getDownloadURL();

            const d = {
                nombre: document.getElementById('r-nombre').value,
                user: user, pass: document.getElementById('r-pass').value,
                placa: document.getElementById('r-placa').value,
                modelo: document.getElementById('r-modelo').value,
                color: document.getElementById('r-color').value, foto: url
            };
            db.ref('conductores/' + user).set(d).then(() => {
                localStorage.setItem('driver_data', JSON.stringify(d));
                location.reload();
            });
        }

        function intentarLogin() {
            const u = document.getElementById('l-user').value.toLowerCase();
            const p = document.getElementById('l-pass').value;
            db.ref('conductores/' + u).once('value', s => {
                const d = s.val();
                if(d && d.pass === p) {
                    localStorage.setItem('driver_data', JSON.stringify(d));
                    location.reload();
                } else alert("Clave incorrecta");
            });
        }

        function cerrarSesion() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
