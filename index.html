<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver Santa Ana</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

    <style>
        :root { --waze-blue: #3366FF; --dark: #202124; --green: #00D37F; --white: #FFFFFF; --red: #FF4B4B; --yellow: #FFC107; }
        body { font-family: 'Segoe UI', sans-serif; background: #F2F4F7; margin: 0; color: var(--dark); }
        .card { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin: 15px; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--waze-blue); color: white; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        .chat-box { height: 250px; overflow-y: auto; background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; flex-direction: column; border: 1px solid #eee; }
        .msg { margin: 5px 0; padding: 10px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .msg.me { align-self: flex-end; background: var(--waze-blue); color: white; }
        .msg.other { align-self: flex-start; background: #e9ecef; color: #333; }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--green); }
    </style>
</head>
<body onload="initApp()">

    <div id="app">
        <!-- PANTALLA INICIAL -->
        <div id="screen-start" style="text-align:center; padding-top:80px;">
            <h1 style="font-weight: 800; font-size: 32px;">Driver Santa Ana</h1>
            <div style="padding: 20px;">
                <button onclick="showScreen('screen-user-form')">PEDIR VIAJE</button>
                <button onclick="showScreen('screen-login')" style="background:#eee; color:black; margin-top:10px;">CONDUCTORES</button>
            </div>
        </div>

        <!-- USUARIO: FORMULARIO -->
        <div id="screen-user-form" class="hidden">
            <div class="card">
                <h2>¿A dónde vas?</h2>
                <input type="text" id="u-nombre" placeholder="Tu nombre">
                <input type="text" id="u-origen" placeholder="Punto de partida">
                <input type="text" id="u-destino" placeholder="Destino">
                <input type="number" id="u-oferta" placeholder="Tu oferta $">
                <button onclick="crearPedido()" style="background:var(--green);">BUSCAR CONDUCTOR</button>
            </div>
        </div>

        <!-- USUARIO: ESPERA Y CHAT -->
        <div id="screen-user-wait" class="hidden">
            <div class="card">
                <div id="user-searching">
                    <h3 style="text-align:center;">Esperando ofertas...</h3>
                    <div id="lista-propuestas"></div>
                </div>
                <div id="user-active" class="hidden">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                        <img id="u-foto-d" class="profile-img">
                        <b id="u-nombre-d"></b>
                    </div>
                    <div id="chat-user" class="chat-box"></div>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="input-user" placeholder="Escribe...">
                        <button onclick="enviarMensaje('user')" style="width:80px;">Enviar</button>
                    </div>
                </div>
                <button onclick="cancelarTodo()" style="background:var(--red); margin-top:10px;">CANCELAR</button>
            </div>
        </div>

        <!-- CONDUCTOR: PANEL -->
        <div id="screen-driver" class="hidden">
            <div class="card" style="display:flex; justify-content:space-between; background:var(--dark); color:white; margin:0; border-radius:0;">
                <span id="d-label"></span>
                <button onclick="cerrarSesion()" style="width:auto; padding:5px; background:red;">SALIR</button>
            </div>
            
            <div id="driver-list"></div>

            <div id="driver-active" class="hidden card">
                <h3 style="color:var(--green);">Viaje aceptado</h3>
                <p id="d-info-p"></p>
                <div id="chat-driver" class="chat-box"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="input-driver" placeholder="Escribe...">
                    <button onclick="enviarMensaje('driver')" style="width:80px;">Enviar</button>
                </div>
                <button onclick="finalizarViaje()" style="background:var(--green); margin-top:10px;">FINALIZAR</button>
            </div>
        </div>

        <!-- LOGIN -->
        <div id="screen-login" class="hidden">
            <div class="card">
                <h2>Login</h2>
                <input type="text" id="l-user" placeholder="Usuario">
                <input type="password" id="l-pass" placeholder="Clave">
                <button onclick="intentarLogin()">ENTRAR</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDgIX4jKwyQcfaTSP0QXAdIAR7UzrQMK3g",
            authDomain: "drive-taxi-baad8.firebaseapp.com",
            databaseURL: "https://drive-taxi-baad8-default-rtdb.firebaseio.com",
            projectId: "drive-taxi-baad8",
            storageBucket: "drive-taxi-baad8.appspot.com",
            appId: "1:308551715355:web:e802500e252893be8c86be"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentViajeId = null;
        let miDataConductor = JSON.parse(localStorage.getItem('driver_data'));

        function showScreen(id) {
            document.querySelectorAll('#app > div').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function initApp() {
            if(miDataConductor) {
                abrirPanelConductor();
            }
        }

        // --- LÓGICA USUARIO ---
        function crearPedido() {
            const id = "V-" + Date.now();
            currentViajeId = id;
            db.ref('viajes/' + id).set({
                cliente: document.getElementById('u-nombre').value,
                origen: document.getElementById('u-origen').value,
                destino: document.getElementById('u-destino').value,
                oferta: document.getElementById('u-oferta').value,
                estado: 'buscando'
            });
            showScreen('screen-user-wait');
            escucharViajeUsuario(id);
        }

        function escucharViajeUsuario(id) {
            db.ref('viajes/' + id).on('value', snap => {
                const v = snap.val();
                if(!v) return;

                if(v.estado === 'buscando') {
                    const lista = document.getElementById('lista-propuestas');
                    lista.innerHTML = "";
                    if(v.propuestas) {
                        Object.keys(v.propuestas).forEach(key => {
                            const p = v.propuestas[key];
                            lista.innerHTML += `
                                <div class="card" style="border:2px solid var(--yellow);">
                                    <p>${p.nombre} propone <b>$${p.monto}</b></p>
                                    <button onclick="usuarioAceptaConductor('${id}', '${key}', '${p.monto}')">ACEPTAR CONDUCTOR</button>
                                </div>`;
                        });
                    }
                } else if(v.estado === 'aceptado') {
                    document.getElementById('user-searching').classList.add('hidden');
                    document.getElementById('user-active').classList.remove('hidden');
                    document.getElementById('u-nombre-d').innerText = v.conductorNombre;
                    document.getElementById('u-foto-d').src = v.conductorFoto;
                    conectarChat(id);
                }
            });
        }

        function usuarioAceptaConductor(viajeId, dId, montoFinal) {
            db.ref('conductores/' + dId).once('value', s => {
                const d = s.val();
                db.ref('viajes/' + viajeId).update({
                    estado: 'aceptado',
                    oferta: montoFinal,
                    conductorId: dId,
                    conductorNombre: d.nombre,
                    conductorFoto: d.foto
                });
            });
        }

        // --- LÓGICA CONDUCTOR ---
        function abrirPanelConductor() {
            showScreen('screen-driver');
            document.getElementById('d-label').innerText = miDataConductor.nombre;

            db.ref('viajes').on('value', snap => {
                const list = document.getElementById('driver-list');
                const active = document.getElementById('driver-active');
                let hayViajePropio = false;

                let html = "<h4>Pedidos disponibles</h4>";
                snap.forEach(child => {
                    const v = child.val();
                    // Si este viaje ya fue aceptado por MÍ
                    if(v.estado === 'aceptado' && v.conductorId === miDataConductor.user) {
                        hayViajePropio = child.key;
                        document.getElementById('d-info-p').innerText = `${v.cliente}: ${v.origen} ➔ ${v.destino} ($${v.oferta})`;
                    } 
                    // Si el viaje busca conductor, mostrarlo
                    else if(v.estado === 'buscando') {
                        html += `
                            <div class="card">
                                <p><b>${v.cliente}</b> ofrece $${v.oferta}</p>
                                <input type="number" id="monto-${child.key}" placeholder="Tu contraoferta $">
                                <button onclick="conductorEnviaPropuesta('${child.key}')">ENVIAR PROPUESTA</button>
                            </div>`;
                    }
                });

                if(hayViajePropio) {
                    currentViajeId = hayViajePropio;
                    list.classList.add('hidden');
                    active.classList.remove('hidden');
                    conectarChat(hayViajePropio);
                } else {
                    list.classList.remove('hidden');
                    active.classList.add('hidden');
                    list.innerHTML = html;
                }
            });
        }

        function conductorEnviaPropuesta(viajeId) {
            const m = document.getElementById('monto-' + viajeId).value;
            if(!m) return alert("Pon un precio");
            db.ref('viajes/' + viajeId + '/propuestas/' + miDataConductor.user).set({
                nombre: miDataConductor.nombre,
                monto: m
            }).then(() => alert("Propuesta enviada al cliente"));
        }

        // --- CHAT ---
        function conectarChat(id) {
            db.ref('viajes/' + id + '/chat').on('value', snap => {
                const box = miDataConductor ? document.getElementById('chat-driver') : document.getElementById('chat-user');
                box.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    const soyYo = (miDataConductor && m.role === 'driver') || (!miDataConductor && m.role === 'user');
                    box.innerHTML += `<div class="msg ${soyYo ? 'me' : 'other'}">${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function enviarMensaje(role) {
            const input = document.getElementById('input-' + role);
            if(!input.value) return;
            db.ref('viajes/' + currentViajeId + '/chat').push({
                role: role,
                text: input.value
            });
            input.value = "";
        }

        // --- AUX ---
        function intentarLogin() {
            const u = document.getElementById('l-user').value.toLowerCase();
            const p = document.getElementById('l-pass').value;
            db.ref('conductores/' + u).once('value', s => {
                const d = s.val();
                if(d && d.pass === p) {
                    localStorage.setItem('driver_data', JSON.stringify(d));
                    location.reload();
                } else alert("Error");
            });
        }

        function finalizarViaje() { db.ref('viajes/' + currentViajeId).remove(); location.reload(); }
        function cerrarSesion() { localStorage.clear(); location.reload(); }
        function cancelarTodo() { db.ref('viajes/' + currentViajeId).remove(); location.reload(); }
    </script>
</body>
</html>
