<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver Santa Ana</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

    <style>
        :root { --waze-blue: #3366FF; --dark: #202124; --green: #00D37F; --white: #FFFFFF; --red: #FF4B4B; --yellow: #FFC107; }
        body { font-family: 'Segoe UI', sans-serif; background: #F2F4F7; margin: 0; color: var(--dark); }
        .card { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin: 15px; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--waze-blue); color: white; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        .btn-cancel { background: var(--red); margin-top: 10px; }
        .btn-negotiate { background: var(--yellow); color: var(--dark); margin-top: 5px; }
        .chat-box { height: 150px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .msg.me { text-align: right; color: var(--waze-blue); }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body onload="checkSession()">

    <div id="app">
        <!-- PANTALLA INICIAL -->
        <div id="screen-start" style="text-align:center; padding-top:60px;">
            <h1 style="font-weight: 800;">Driver Santa Ana</h1>
            <p>Transporte local seguro</p>
            <div style="padding: 20px;">
                <button onclick="showScreen('screen-user-form')">SOLICITAR VIAJE</button>
                <button onclick="showScreen('screen-login')" style="background:#E9EDF0; color:#202124; margin-top:10px;">CONDUCTORES</button>
            </div>
        </div>

        <!-- FORMULARIO USUARIO -->
        <div id="screen-user-form" class="hidden">
            <div class="card">
                <h2>Detalles del Viaje</h2>
                <input type="text" id="u-nombre" placeholder="Tu nombre">
                <input type="text" id="u-origen" placeholder="Punto de salida">
                <input type="text" id="u-destino" placeholder="Destino">
                <input type="number" id="u-oferta" placeholder="Tu oferta inicial $">
                <button onclick="enviarPedido()" style="background:var(--green);">BUSCAR CONDUCTOR</button>
                <button onclick="location.reload()" style="background:none; color:gray; margin-top:10px;">Volver</button>
            </div>
        </div>

        <!-- NEGOCIACIÓN Y ESPERA USUARIO -->
        <div id="screen-user-wait" class="hidden">
            <div class="card">
                <div id="wait-ui">
                    <h3 style="text-align:center;">Esperando propuestas...</h3>
                    <div id="lista-contraofertas"></div>
                </div>

                <div id="active-trip-user" class="hidden">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img id="view-d-foto" class="profile-img">
                        <div>
                            <b id="view-d-nombre"></b><br>
                            <small id="view-d-vehi"></small>
                        </div>
                    </div>
                    <div id="chat-user" class="chat-box" style="margin-top:15px;"></div>
                    <input type="text" id="input-chat-user" placeholder="Mensaje...">
                    <button onclick="enviarMensaje('user')" style="padding:10px;">Enviar</button>
                </div>
                <button onclick="cancelarViajeUsuario()" class="btn-cancel">CANCELAR PEDIDO</button>
            </div>
        </div>

        <!-- PANEL CONDUCTOR -->
        <div id="screen-driver" class="hidden">
            <div class="card">Hola, <b id="d-label"></b></div>
            <div id="d-pedidos"></div>
            <div id="d-activo" class="hidden card">
                <h3 style="color:var(--green);">Viaje en Curso</h3>
                <div id="chat-driver" class="chat-box"></div>
                <input type="text" id="input-chat-driver" placeholder="Mensaje...">
                <button onclick="enviarMensaje('driver')" style="padding:10px; margin-bottom:5px;">Enviar</button>
                <button onclick="finalizarViaje()" style="background:var(--green);">FINALIZAR</button>
                <button onclick="cancelarViajeConductor()" class="btn-cancel">CANCELAR Y REASIGNAR</button>
            </div>
        </div>

        <!-- LOGIN / REGISTRO (Mismo que el anterior) -->
        <div id="screen-login" class="hidden">
            <div class="card">
                <h2>Ingreso</h2>
                <input type="text" id="l-user" placeholder="Usuario">
                <input type="password" id="l-pass" placeholder="Clave">
                <button onclick="intentarLogin()">ENTRAR</button>
                <button onclick="showScreen('screen-register')" style="margin-top:10px;">REGISTRARSE</button>
            </div>
        </div>

        <div id="screen-register" class="hidden">
            <div class="card">
                <h3>Registro Socio</h3>
                <input type="text" id="r-nombre" placeholder="Nombre">
                <input type="text" id="r-user" placeholder="Usuario">
                <input type="password" id="r-pass" placeholder="Clave">
                <input type="text" id="r-placa" placeholder="Placa">
                <input type="text" id="r-modelo" placeholder="Vehículo">
                <input type="text" id="r-color" placeholder="Color">
                <input type="file" id="r-foto" accept="image/*">
                <p style="font-size:10px;">Acepto los términos de servicio de Driver Santa Ana.</p>
                <button onclick="registrarConductor()">CREAR CUENTA</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDgIX4jKwyQcfaTSP0QXAdIAR7UzrQMK3g",
            authDomain: "drive-taxi-baad8.firebaseapp.com",
            databaseURL: "https://drive-taxi-baad8-default-rtdb.firebaseio.com",
            projectId: "drive-taxi-baad8",
            storageBucket: "drive-taxi-baad8.appspot.com",
            appId: "1:308551715355:web:e802500e252893be8c86be"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();
        let currentViajeId = null;

        window.showScreen = (id) => {
            document.querySelectorAll('#app > div').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        // --- USUARIO ---
        window.enviarPedido = () => {
            const v = {
                cliente: document.getElementById('u-nombre').value,
                origen: document.getElementById('u-origen').value,
                destino: document.getElementById('u-destino').value,
                oferta: document.getElementById('u-oferta').value,
                estado: 'buscando'
            };
            currentViajeId = "V-" + Date.now();
            db.ref('viajes/' + currentViajeId).set(v);
            showScreen('screen-user-wait');
            escucharViaje();
        };

        function escucharViaje() {
            db.ref('viajes/' + currentViajeId).on('value', snap => {
                const v = snap.val();
                if(!v) return;

                const lista = document.getElementById('lista-contraofertas');
                lista.innerHTML = "";

                if(v.contraofertas && v.estado === 'buscando') {
                    Object.keys(v.contraofertas).forEach(key => {
                        const co = v.contraofertas[key];
                        lista.innerHTML += `
                            <div class="card" style="border:1px solid var(--yellow); margin:5px 0;">
                                <p><b>${co.nombre}</b> propone <b>$${co.monto}</b></p>
                                <button onclick="aceptarOferta('${key}', '${co.monto}', '${co.user}')" style="background:var(--green); padding:10px;">ACEPTAR</button>
                            </div>`;
                    });
                }

                if(v.estado === 'aceptado') {
                    document.getElementById('wait-ui').classList.add('hidden');
                    document.getElementById('active-trip-user').classList.remove('hidden');
                    document.getElementById('view-d-nombre').innerText = v.conductor;
                    document.getElementById('view-d-vehi').innerText = v.modelo + " " + v.color;
                    document.getElementById('view-d-foto').src = v.fotoConductor;
                    escucharChat();
                }
            });
        }

        window.aceptarOferta = (key, monto, dUser) => {
            db.ref('conductores/' + dUser).once('value', s => {
                const d = s.val();
                db.ref('viajes/' + currentViajeId).update({
                    estado: 'aceptado',
                    oferta: monto,
                    conductor: d.nombre,
                    placa: d.placa,
                    modelo: d.modelo,
                    color: d.color,
                    fotoConductor: d.foto
                });
            });
        };

        // --- CONDUCTOR ---
        function initDriverPanel(data) {
            showScreen('screen-driver');
            document.getElementById('d-label').innerText = data.nombre;
            db.ref('viajes').on('value', snap => {
                const list = document.getElementById('d-pedidos');
                if(!document.getElementById('d-activo').classList.contains('hidden')) return;
                list.innerHTML = "";
                snap.forEach(child => {
                    const v = child.val();
                    if(v.estado === 'buscando') {
                        list.innerHTML += `
                            <div class="card">
                                <p>👤 ${v.cliente} ($${v.oferta})</p>
                                <p>${v.origen} ➔ ${v.destino}</p>
                                <button onclick="aceptarDirecto('${child.key}')" style="background:var(--green);">ACEPTAR $${v.oferta}</button>
                                <input type="number" id="neg-${child.key}" placeholder="Nueva Oferta $" style="margin-top:10px;">
                                <button class="btn-negotiate" onclick="contraofertar('${child.key}')">CONTRAOFERTAR</button>
                            </div>`;
                    }
                });
            });
        }

        window.contraofertar = (id) => {
            const monto = document.getElementById('neg-'+id).value;
            const d = JSON.parse(localStorage.getItem('driver_data'));
            db.ref('viajes/' + id + '/contraofertas/' + d.user).set({
                nombre: d.nombre, monto: monto, user: d.user
            });
            alert("Propuesta enviada");
        };

        window.cancelarViajeConductor = () => {
            if(confirm("¿Cancelar y permitir que otro conductor lo tome?")) {
                db.ref('viajes/' + currentViajeId).update({
                    estado: 'buscando',
                    conductor: null,
                    contraofertas: null,
                    chat: null
                }).then(() => location.reload());
            }
        };

        // --- CHAT Y SESIÓN ---
        window.enviarMensaje = (quien) => {
            const msg = document.getElementById('input-chat-' + quien).value;
            if(msg) {
                db.ref('viajes/' + currentViajeId + '/chat').push({ user: quien, text: msg });
                document.getElementById('input-chat-' + quien).value = "";
            }
        };

        function escucharChat() {
            db.ref('viajes/' + currentViajeId + '/chat').on('value', snap => {
                const boxes = [document.getElementById('chat-user'), document.getElementById('chat-driver')];
                boxes.forEach(b => { if(b) b.innerHTML = ""; });
                snap.forEach(c => {
                    const m = c.val();
                    const html = `<div class="msg ${m.user === 'user' ? 'me' : 'other'}">${m.text}</div>`;
                    boxes.forEach(b => { if(b) b.innerHTML += html; });
                });
            });
        }

        // (Funciones de Registro/Login iguales al código anterior para ahorrar espacio)
        window.registrarConductor = async () => {
            const user = document.getElementById('r-user').value.toLowerCase();
            const file = document.getElementById('r-foto').files[0];
            let url = "";
            if(file) {
                const ref = storage.ref('conductores/' + user + '.jpg');
                await ref.put(file);
                url = await ref.getDownloadURL();
            }
            const d = {
                nombre: document.getElementById('r-nombre').value,
                user: user, pass: document.getElementById('r-pass').value,
                placa: document.getElementById('r-placa').value,
                modelo: document.getElementById('r-modelo').value,
                color: document.getElementById('r-color').value, foto: url
            };
            db.ref('conductores/' + user).set(d).then(() => {
                localStorage.setItem('driver_data', JSON.stringify(d));
                location.reload();
            });
        };

        window.intentarLogin = () => {
            const u = document.getElementById('l-user').value.toLowerCase();
            const p = document.getElementById('l-pass').value;
            db.ref('conductores/' + u).once('value', s => {
                const d = s.val();
                if(d && d.pass === p) {
                    localStorage.setItem('driver_data', JSON.stringify(d));
                    location.reload();
                } else alert("Error");
            });
        };

        window.checkSession = () => {
            const s = localStorage.getItem('driver_data');
            if(s) initDriverPanel(JSON.parse(s));
        };
        window.finalizarViaje = () => { db.ref('viajes/' + currentViajeId).remove(); location.reload(); };
        window.cancelarViajeUsuario = () => { db.ref('viajes/' + currentViajeId).remove(); location.reload(); };
        window.cerrarSesion = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
