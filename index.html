<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveTaxi - Lista Limpia</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #f1c40f; --dark: #2c3e50; --accent: #27ae60; --gray: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding-bottom: 50px; }
        .app { max-width: 450px; margin: auto; background: white; min-height: 100vh; position: relative; }
        .header { background: var(--dark); color: var(--primary); padding: 20px; text-align: center; font-weight: bold; font-size: 1.5rem; }
        .container { padding: 20px; }
        .card { border-radius: 12px; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; background: #fff; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: var(--primary); color: var(--dark); border: none; font-weight: bold; cursor: pointer; }
        .btn-secondary { background: var(--dark); color: white; }
        .hidden { display: none; }
        #chat-box { height: 200px; overflow-y: auto; border: 1px solid #eee; padding: 10px; background: #f9f9f9; display: flex; flex-direction: column; margin-top:10px; }
        .msg { padding: 8px 12px; border-radius: 15px; margin: 4px 0; max-width: 80%; font-size: 0.8rem; }
        .msg.user { background: var(--primary); align-self: flex-end; }
        .msg.driver { background: #ddd; align-self: flex-start; }
        .img-preview { width: 100%; height: 100px; border-radius: 8px; object-fit: cover; background: #eee; margin-bottom: 5px; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .disponible { background: #27ae60; color: white; }
        .en-viaje { background: #e67e22; color: white; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">DRIVE-TAXI</div>

    <div class="container">
        <!-- VISTAS PRINCIPALES -->
        <div id="view-home">
            <button onclick="changeView('view-user-form')">Pedir un Viaje</button>
            <button class="btn-secondary" onclick="changeView('view-driver-login')">Entrar como Conductor</button>
        </div>

        <div id="view-driver-login" class="hidden">
            <h3>Login Piloto</h3>
            <input type="text" id="l-user" placeholder="Usuario">
            <input type="password" id="l-pass" placeholder="Contraseña">
            <button onclick="loginConductor()">Ingresar</button>
            <button class="btn-secondary" onclick="changeView('view-driver-reg')">Registro Nuevo</button>
            <button class="btn-secondary" onclick="changeView('view-home')" style="margin-top:20px">Volver</button>
        </div>

        <div id="view-driver-reg" class="hidden">
            <h3>Registro</h3>
            <input type="text" id="d-nombre" placeholder="Nombre Completo">
            <input type="file" accept="image/*" onchange="encodeImage(this, 'perfil')">
            <input type="text" id="d-carro" placeholder="Modelo del Vehículo">
            <input type="text" id="d-placa" placeholder="Placa">
            <input type="file" accept="image/*" onchange="encodeImage(this, 'carro')">
            <input type="text" id="d-user" placeholder="Usuario">
            <input type="password" id="d-pass" placeholder="Contraseña">
            <button onclick="registrarConductor()">Registrar</button>
            <button class="btn-secondary" onclick="changeView('view-driver-login')">Volver</button>
        </div>

        <div id="view-user-form" class="hidden">
            <h3>Solicitud de Viaje</h3>
            <input type="text" id="u-nombre" placeholder="Tu Nombre">
            <input type="text" id="u-origen" placeholder="¿Dónde estás?">
            <input type="text" id="u-destino" placeholder="¿A dónde vas?">
            <label>Oferta ($):</label>
            <input type="number" id="u-oferta" value="5.00">
            <div id="ofertas-recibidas"></div>
            <button onclick="crearViaje()">Solicitar ahora</button>
            <button class="btn-secondary" onclick="changeView('view-home')">Cancelar</button>
        </div>

        <div id="view-driver-panel" class="hidden">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3>Panel de Pilotos</h3>
                <button class="btn-secondary" style="width:70px; font-size:0.7rem" onclick="logoutConductor()">Salir</button>
            </div>
            <div class="card">
                <b>Conductores Activos:</b>
                <div id="lista-estados"></div>
            </div>
            <hr>
            <h4>Viajes en Espera</h4>
            <div id="lista-viajes"></div>
        </div>

        <div id="view-active-trip" class="hidden">
            <div id="info-asignada" class="card"></div>
            <div id="chat-box"></div>
            <div style="display: flex; gap: 5px; margin-top:10px">
                <input type="text" id="chat-input" placeholder="Escribe...">
                <button style="width:60px" onclick="enviarMensaje()">OK</button>
            </div>
            <button id="btn-finalizar" class="btn-secondary" style="margin-top:20px" onclick="finalizarViaje()">Finalizar Viaje</button>
        </div>

        <div id="view-ticket" class="hidden">
            <div class="card" style="text-align: center;">
                <h2 style="color:var(--accent)">¡LLEGAMOS!</h2>
                <div id="ticket-content"></div>
                <button onclick="location.reload()">Nuevo Viaje</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://drive-taxi-baad8-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let tripID = null, rol = "", miNombre = "", fotoPerfil = "", fotoCarro = "", datosViajeLocal = {}, conductorLogueado = null;

    function changeView(id) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function encodeImage(input, tipo) {
        const reader = new FileReader();
        reader.onload = e => { if(tipo === 'perfil') fotoPerfil = e.target.result; else fotoCarro = e.target.result; };
        reader.readAsDataURL(input.files[0]);
    }

    function registrarConductor() {
        const user = document.getElementById('d-user').value;
        const d = { 
            nombre: document.getElementById('d-nombre').value, 
            carro: document.getElementById('d-carro').value, 
            placa: document.getElementById('d-placa').value, 
            usuario: user, 
            pass: document.getElementById('d-pass').value, 
            foto: fotoPerfil, fotoV: fotoCarro, estado: "offline" 
        };
        database.ref('conductores/' + user).set(d).then(() => { alert("Registrado"); changeView('view-driver-login'); });
    }

    function loginConductor() {
        const user = document.getElementById('l-user').value;
        const pass = document.getElementById('l-pass').value;
        database.ref('conductores/' + user).once('value').then(s => {
            const d = s.val();
            if(d && d.pass === pass) {
                conductorLogueado = d; miNombre = d.nombre; rol = "conductor";
                actualizarEstadoPiloto("disponible");
                changeView('view-driver-panel'); 
                cargarViajesDisponibles();
                escucharPilotos();
            } else { alert("Error de acceso"); }
        });
    }

    function actualizarEstadoPiloto(st) {
        if(conductorLogueado) database.ref('conductores/' + conductorLogueado.usuario).update({ estado: st });
    }

    function escucharPilotos() {
        database.ref('conductores').on('value', snap => {
            const list = document.getElementById('lista-estados');
            list.innerHTML = "";
            snap.forEach(c => {
                const p = c.val();
                // LIMPIEZA CRÍTICA: Solo mostrar conductores reales y con sesión activa
                if(p.nombre && (p.estado === "disponible" || p.estado === "en viaje")) {
                    const clase = p.estado === 'disponible' ? 'disponible' : 'en-viaje';
                    list.innerHTML += `<p><b>${p.nombre}</b> <span class="badge ${clase}">${p.estado}</span></p>`;
                }
            });
        });
    }

    function crearViaje() {
        miNombre = document.getElementById('u-nombre').value;
        const ref = database.ref('viajes_activos').push();
        tripID = ref.key; rol = "usuario";
        ref.set({ 
            pasajero: miNombre, 
            origen: document.getElementById('u-origen').value, 
            destino: document.getElementById('u-destino').value, 
            oferta: document.getElementById('u-oferta').value, 
            estado: "esperando" 
        });
        escucharViaje();
    }

    function escucharViaje() {
        database.ref('viajes_activos/' + tripID).on('value', snap => {
            const v = snap.val();
            if(!v) return;
            datosViajeLocal = v;

            if(v.estado === "esperando" && v.contraoferta) {
                document.getElementById('ofertas-recibidas').innerHTML = `
                    <div class="card" style="border: 2px solid var(--primary)">
                        <p>${v.contraoferta.nombre} ofrece <b>$${v.contraoferta.monto}</b></p>
                        <button onclick="aceptarContraoferta()">Aceptar Precio</button>
                    </div>`;
            }

            if(v.estado === "aceptado") { 
                mostrarFichaCompleta(v.conductor); 
                iniciarChat(); 
            }

            if(v.estado === "finalizado") {
                if(rol === "usuario") mostrarTicket(v);
                else { tripID = null; changeView('view-driver-panel'); }
            }
        });
    }

    function aceptarContraoferta() {
        database.ref('viajes_activos/' + tripID).update({ 
            estado: "aceptado", 
            oferta: datosViajeLocal.contraoferta.monto, 
            conductor: datosViajeLocal.contraoferta.datosConductor 
        });
    }

    function cargarViajesDisponibles() {
        database.ref('viajes_activos').on('value', snap => {
            const container = document.getElementById('lista-viajes');
            if(tripID) return;
            container.innerHTML = "";
            snap.forEach(child => {
                const v = child.val();
                if(v.estado === "esperando") {
                    container.innerHTML += `<div class="card">
                        <b>Ruta:</b> ${v.origen} → ${v.destino}<br>Oferta: <b>$${v.oferta}</b>
                        <button onclick="aceptarViajeDirecto('${child.key}')">Aceptar</button>
                        <button class="btn-secondary" onclick="enviarContraoferta('${child.key}')">Negociar</button>
                    </div>`;
                }
            });
        });
    }

    function enviarContraoferta(id) {
        const monto = prompt("Tu precio:");
        if(monto) {
            tripID = id;
            database.ref('viajes_activos/' + id).update({ 
                contraoferta: { nombre: miNombre, monto: monto, datosConductor: conductorLogueado } 
            });
            escucharViaje();
        }
    }

    function aceptarViajeDirecto(id) {
        tripID = id;
        actualizarEstadoPiloto("en viaje");
        database.ref('viajes_activos/' + id).update({ estado: "aceptado", conductor: conductorLogueado });
        escucharViaje();
    }

    function mostrarFichaCompleta(c) {
        changeView('view-active-trip');
        document.getElementById('info-asignada').innerHTML = `
            <div style="text-align:center">
                <div style="display:flex; gap:10px; justify-content:center">
                    <img src="${c.foto}" class="img-preview" style="width:80px;height:80px;border-radius:50%">
                    <img src="${c.fotoV}" class="img-preview" style="width:120px;height:80px">
                </div>
                <h4>${c.nombre}</h4>
                <p><b>Vehículo:</b> ${c.carro}<br><b>Placa:</b> ${c.placa}</p>
                <h2 style="color:var(--accent)">Pago: $${datosViajeLocal.oferta}</h2>
            </div>`;
        document.getElementById('btn-finalizar').style.display = (rol === "conductor") ? "block" : "none";
    }

    function mostrarTicket(v) {
        changeView('view-ticket');
        document.getElementById('ticket-content').innerHTML = `
            <p><b>Origen:</b> ${v.origen}</p>
            <p><b>Destino:</b> ${v.destino}</p>
            <hr>
            <p>Conductor: ${v.conductor.nombre}</p>
            <h1 style="font-size:3.5rem">$${v.oferta}</h1>
        `;
    }

    function iniciarChat() {
        const chatBox = document.getElementById('chat-box');
        database.ref('chats/' + tripID).on('child_added', snap => {
            const m = snap.val(), clase = (m.rol === rol) ? 'user' : 'driver';
            chatBox.innerHTML += `<div class="msg ${clase}"><b>${m.nombre}:</b><br>${m.texto}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    function enviarMensaje() {
        const input = document.getElementById('chat-input');
        if(input.value) {
            database.ref('chats/' + tripID).push({ nombre: miNombre, rol: rol, texto: input.value });
            input.value = "";
        }
    }

    function finalizarViaje() {
        actualizarEstadoPiloto("disponible");
        database.ref('viajes_activos/' + tripID).update({ estado: "finalizado" });
    }

    function logoutConductor() {
        actualizarEstadoPiloto("offline");
        location.reload();
    }
</script>
</body>
</html>
