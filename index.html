<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveTaxi - Negociación en Vivo</title>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #f1c40f; --dark: #2c3e50; --accent: #27ae60; --gray: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding-bottom: 50px; }
        .app { max-width: 450px; margin: auto; background: white; min-height: 100vh; position: relative; }
        .header { background: var(--dark); color: var(--primary); padding: 20px; text-align: center; font-weight: bold; font-size: 1.5rem; }
        .container { padding: 20px; }
        .card { border-radius: 12px; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; background: #fff; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1rem; }
        button { background: var(--primary); color: var(--dark); border: none; font-weight: bold; cursor: pointer; }
        .btn-secondary { background: var(--dark); color: white; }
        .hidden { display: none; }
        .price-tag { font-size: 1.8rem; color: var(--accent); font-weight: bold; text-align: center; display: block; }
        #chat-box { height: 300px; overflow-y: auto; border: 1px solid #eee; padding: 10px; background: #f9f9f9; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; border-radius: 15px; margin: 4px 0; max-width: 80%; }
        .msg.user { background: var(--primary); align-self: flex-end; }
        .msg.driver { background: #ddd; align-self: flex-start; }
        .img-preview { width: 100%; height: 200px; border-radius: 8px; object-fit: cover; margin-top: 10px; background: #eee; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">DRIVE-TAXI</div>

    <div class="container">
        
        <!-- SELECCIÓN INICIAL -->
        <div id="view-home">
            <h2>¿Cómo deseas ingresar?</h2>
            <button onclick="changeView('view-user-form')">Pedir un Viaje</button>
            <button class="btn-secondary" onclick="changeView('view-driver-reg')">Registrarme como Conductor</button>
            <button class="btn-secondary" style="margin-top:20px; opacity:0.7" onclick="changeView('view-driver-panel')">Panel de Conductores (Login)</button>
        </div>

        <!-- FORMULARIO USUARIO -->
        <div id="view-user-form" class="hidden">
            <h3>Tu solicitud de viaje</h3>
            <input type="text" id="u-nombre" placeholder="¿Cuál es tu nombre?">
            <input type="text" id="u-origen" placeholder="Punto de partida">
            <input type="text" id="u-destino" placeholder="¿A dónde vas?">
            <label>Tu oferta (Base $4.00):</label>
            <input type="number" id="u-oferta" value="4.00" min="4.00">
            <button onclick="crearViaje()">Solicitar ahora</button>
            <button class="btn-secondary" onclick="changeView('view-home')">Cancelar</button>
        </div>

        <!-- REGISTRO CONDUCTOR -->
        <div id="view-driver-reg" class="hidden">
            <h3>Registro de Nuevo Conductor</h3>
            <input type="text" id="d-nombre" placeholder="Nombres y Apellidos">
            <input type="text" id="d-doc" placeholder="Número de Documento">
            <input type="text" id="d-carro" placeholder="Tipo de Vehículo">
            <input type="text" id="d-color" placeholder="Color del vehículo">
            <input type="text" id="d-placa" placeholder="Número de Placa">
            <label>Foto de Perfil / Vehículo:</label>
            <input type="file" id="d-foto" accept="image/*" capture="environment" onchange="previewImage(this)">
            <img id="preview" class="img-preview hidden">
            <hr>
            <input type="text" id="d-user" placeholder="Crea tu Usuario">
            <input type="password" id="d-pass" placeholder="Crea tu Contraseña">
            <button onclick="registrarConductor()">Finalizar Registro</button>
        </div>

        <!-- PANEL DE CONDUCTORES -->
        <div id="view-driver-panel" class="hidden">
            <h3>Viajes Disponibles</h3>
            <div id="lista-viajes">
                <p style="text-align:center">Buscando servicios cercanos...</p>
            </div>
        </div>

        <!-- PANTALLA DE VIAJE ACTIVO Y CHAT -->
        <div id="view-active-trip" class="hidden">
            <div id="info-asignada" class="card">
                <!-- Se llena dinámicamente -->
            </div>
            <div id="chat-box"></div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="chat-input" placeholder="Escribe un mensaje...">
                <button style="width:80px" onclick="enviarMensaje()">OK</button>
            </div>
            <button class="btn-secondary" style="margin-top:10px" onclick="location.reload()">Finalizar Viaje</button>
        </div>

    </div>
</div>

<script>
    // --- CONFIGURACIÓN FIREBASE ---
    const firebaseConfig = {
        databaseURL: "https://drive-taxi-baad8-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let tripID = null;
    let rol = ""; // 'usuario' o 'conductor'
    let miNombre = "";
    let fotoBase64 = "";

    // --- FUNCIONES DE VISTA ---
    function changeView(id) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                fotoBase64 = e.target.result;
                document.getElementById('preview').src = fotoBase64;
                document.getElementById('preview').classList.remove('hidden');
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // --- LÓGICA USUARIO ---
    function crearViaje() {
        miNombre = document.getElementById('u-nombre').value;
        const origen = document.getElementById('u-origen').value;
        const destino = document.getElementById('u-destino').value;
        const oferta = document.getElementById('u-oferta').value;

        if(!miNombre || !origen || !destino) return alert("Por favor llena todos los campos");

        const nuevoViajeRef = database.ref('viajes_activos').push();
        tripID = nuevoViajeRef.key;
        rol = "usuario";

        nuevoViajeRef.set({
            pasajero: miNombre,
            origen: origen,
            destino: destino,
            oferta: oferta,
            estado: "esperando",
            conductor: null
        });

        alert("Solicitud enviada. Espera a que un piloto acepte.");
        escucharEstadoViaje();
    }

    function escucharEstadoViaje() {
        database.ref('viajes_activos/' + tripID).on('value', (snapshot) => {
            const data = snapshot.val();
            if(data && data.estado === "aceptado") {
                mostrarFichaConductor(data.conductor);
                iniciarChat();
            }
        });
    }

    // --- LÓGICA CONDUCTOR ---
    function registrarConductor() {
        const d = {
            nombre: document.getElementById('d-nombre').value,
            carro: document.getElementById('d-carro').value,
            color: document.getElementById('d-color').value,
            placa: document.getElementById('d-placa').value,
            usuario: document.getElementById('d-user').value,
            pass: document.getElementById('d-pass').value,
            foto: fotoBase64
        };

        database.ref('conductores/' + d.usuario).set(d);
        alert("¡Registro exitoso! Ahora puedes ver viajes.");
        miNombre = d.nombre;
        rol = "conductor";
        changeView('view-driver-panel');
        cargarViajesDisponibles(d);
    }

    function cargarViajesDisponibles(datosConductor) {
        database.ref('viajes_activos').on('value', (snapshot) => {
            const container = document.getElementById('lista-viajes');
            container.innerHTML = "";
            snapshot.forEach((child) => {
                const viaje = child.val();
                if(viaje.estado === "esperando") {
                    container.innerHTML += `
                        <div class="card">
                            <p><b>Ruta:</b> ${viaje.origen} → ${viaje.destino}</p>
                            <span class="price-tag">$${viaje.oferta}</span>
                            <button onclick="aceptarViaje('${child.key}', '${datosConductor.usuario}')">Aceptar este Viaje</button>
                        </div>
                    `;
                }
            });
        });
    }

    function aceptarViaje(id, userConductor) {
        database.ref('conductores/' + userConductor).once('value').then((snap) => {
            const c = snap.val();
            database.ref('viajes_activos/' + id).update({
                estado: "aceptado",
                conductor: c
            });
            tripID = id;
            rol = "conductor";
            iniciarChat();
        });
    }

    // --- SISTEMA DE CHAT Y FICHA ---
    function mostrarFichaConductor(c) {
        changeView('view-active-trip');
        document.getElementById('info-asignada').innerHTML = `
            <h3>Piloto en camino</h3>
            <p><b>Nombre:</b> ${c.nombre}</p>
            <p><b>Vehículo:</b> ${c.carro} (${c.color})</p>
            <p><b>Placa:</b> ${c.placa}</p>
            ${c.foto ? `<img src="${c.foto}" class="img-preview">` : ''}
        `;
    }

    function iniciarChat() {
        changeView('view-active-trip');
        database.ref('chats/' + tripID).on('child_added', (snapshot) => {
            const m = snapshot.val();
            const box = document.getElementById('chat-box');
            const clase = (m.rol === rol) ? 'user' : 'driver';
            box.innerHTML += `<div class="msg ${clase}"><b>${m.nombre}:</b><br>${m.texto}</div>`;
            box.scrollTop = box.scrollHeight;
        });
    }

    function enviarMensaje() {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        
        database.ref('chats/' + tripID).push({
            nombre: miNombre,
            rol: rol,
            texto: input.value
        });
        input.value = "";
    }
</script>

</body>
</html>
