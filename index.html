<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveTaxi - Finalización Sincronizada</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #f1c40f; --dark: #2c3e50; --accent: #27ae60; --gray: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding-bottom: 50px; }
        .app { max-width: 450px; margin: auto; background: white; min-height: 100vh; position: relative; }
        .header { background: var(--dark); color: var(--primary); padding: 20px; text-align: center; font-weight: bold; font-size: 1.5rem; }
        .container { padding: 20px; }
        .card { border-radius: 12px; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; background: #fff; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: var(--primary); color: var(--dark); border: none; font-weight: bold; cursor: pointer; }
        .btn-secondary { background: var(--dark); color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .hidden { display: none; }
        .price-tag { font-size: 1.8rem; color: var(--accent); font-weight: bold; text-align: center; display: block; }
        #chat-box { height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 10px; background: #f9f9f9; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; border-radius: 15px; margin: 4px 0; max-width: 80%; font-size: 0.9rem; }
        .msg.user { background: var(--primary); align-self: flex-end; }
        .msg.driver { background: #ddd; align-self: flex-start; }
        .img-preview { width: 100%; height: 180px; border-radius: 8px; object-fit: cover; margin-top: 10px; background: #eee; }
        .ticket { border: 2px dashed #333; padding: 20px; text-align: center; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">DRIVE-TAXI</div>

    <div class="container">
        <!-- VISTAS COMUNES -->
        <div id="view-home">
            <button onclick="changeView('view-user-form')">Pedir un Viaje</button>
            <button class="btn-secondary" onclick="changeView('view-driver-login')">Entrar como Conductor</button>
        </div>

        <div id="view-driver-login" class="hidden">
            <h3>Login Piloto</h3>
            <input type="text" id="l-user" placeholder="Usuario">
            <input type="password" id="l-pass" placeholder="Contraseña">
            <button onclick="loginConductor()">Ingresar</button>
            <button class="btn-secondary" onclick="changeView('view-home')">Volver</button>
        </div>

        <div id="view-driver-reg" class="hidden">
            <h3>Registro de Piloto</h3>
            <input type="text" id="d-nombre" placeholder="Nombre Completo">
            <input type="text" id="d-carro" placeholder="Vehículo y Color">
            <input type="text" id="d-placa" placeholder="Placa">
            <input type="file" id="d-foto" accept="image/*" capture="environment" onchange="previewImage(this)">
            <img id="preview" class="img-preview hidden">
            <input type="text" id="d-user" placeholder="Crea tu Usuario">
            <input type="password" id="d-pass" placeholder="Crea tu Contraseña">
            <button onclick="registrarConductor()">Registrar y Entrar</button>
            <button class="btn-secondary" onclick="changeView('view-home')">Volver</button>
        </div>

        <div id="view-user-form" class="hidden">
            <h3>Tu solicitud de viaje</h3>
            <input type="text" id="u-nombre" placeholder="¿Cuál es tu nombre?">
            <input type="text" id="u-origen" placeholder="Origen">
            <input type="text" id="u-destino" placeholder="Destino">
            <label>Tu oferta ($):</label>
            <input type="number" id="u-oferta" value="4.00">
            <div id="ofertas-recibidas"></div>
            <button onclick="crearViaje()">Solicitar ahora</button>
            <button class="btn-secondary" onclick="changeView('view-home')">Cancelar</button>
        </div>

        <div id="view-driver-panel" class="hidden">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3>Viajes Disponibles</h3>
                <button class="btn-danger" style="width:70px; font-size:0.7rem" onclick="logoutConductor()">Salir</button>
            </div>
            <div id="lista-viajes"></div>
        </div>

        <div id="view-active-trip" class="hidden">
            <div id="info-asignada" class="card"></div>
            <div id="chat-box"></div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="chat-input" placeholder="Mensaje...">
                <button style="width:70px" onclick="enviarMensaje()">OK</button>
            </div>
            <button id="btn-finalizar" class="btn-secondary" style="margin-top:10px" onclick="finalizarViaje()">Finalizar Viaje</button>
        </div>

        <div id="view-ticket" class="hidden">
            <div class="ticket card">
                <h2>RECIBO</h2>
                <hr><p id="t-fecha"></p>
                <p id="t-ruta"></p>
                <p id="t-conductor"></p>
                <hr>
                <h1>TOTAL: <span id="t-precio"></span></h1>
                <button onclick="location.reload()">Nuevo Viaje</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://drive-taxi-baad8-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let tripID = null, rol = "", miNombre = "", fotoBase64 = "", datosViajeLocal = {}, conductorLogueado = null;

    window.onload = () => {
        const saved = localStorage.getItem('driverData');
        if(saved) {
            conductorLogueado = JSON.parse(saved);
            miNombre = conductorLogueado.nombre;
            rol = "conductor";
            changeView('view-driver-panel');
            cargarViajesDisponibles();
        }
    }

    function changeView(id) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { fotoBase64 = e.target.result; document.getElementById('preview').src = fotoBase64; document.getElementById('preview').classList.remove('hidden'); }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // --- LÓGICA CONDUCTOR ---
    function loginConductor() {
        const user = document.getElementById('l-user').value;
        const pass = document.getElementById('l-pass').value;
        database.ref('conductores/' + user).once('value').then(s => {
            const d = s.val();
            if(d && d.pass === pass) {
                localStorage.setItem('driverData', JSON.stringify(d));
                conductorLogueado = d; miNombre = d.nombre; rol = "conductor";
                changeView('view-driver-panel'); cargarViajesDisponibles();
            } else { alert("Credenciales incorrectas"); }
        });
    }

    function logoutConductor() { localStorage.removeItem('driverData'); location.reload(); }

    function registrarConductor() {
        const d = { nombre: document.getElementById('d-nombre').value, carro: document.getElementById('d-carro').value, placa: document.getElementById('d-placa').value, usuario: document.getElementById('d-user').value, pass: document.getElementById('d-pass').value, foto: fotoBase64 };
        database.ref('conductores/' + d.usuario).set(d).then(() => {
            localStorage.setItem('driverData', JSON.stringify(d));
            conductorLogueado = d; miNombre = d.nombre; rol = "conductor";
            changeView('view-driver-panel'); cargarViajesDisponibles();
        });
    }

    // --- LÓGICA USUARIO ---
    function crearViaje() {
        miNombre = document.getElementById('u-nombre').value;
        const origen = document.getElementById('u-origen').value, destino = document.getElementById('u-destino').value, oferta = document.getElementById('u-oferta').value;
        if(!miNombre || !origen || !destino) return alert("Datos incompletos");
        const ref = database.ref('viajes_activos').push();
        tripID = ref.key; rol = "usuario";
        ref.set({ pasajero: miNombre, origen, destino, oferta, estado: "esperando" });
        escucharViaje();
    }

    function escucharViaje() {
        database.ref('viajes_activos/' + tripID).on('value', (snap) => {
            const v = snap.val();
            if(!v) {
                // Si el viaje desaparece de la DB y no estamos en ticket, es que se canceló o finalizó
                if(datosViajeLocal.estado === "finalizado") {
                    mostrarTicketFinal();
                }
                return;
            };
            
            datosViajeLocal = v;
            
            if(v.estado === "esperando" && v.contraoferta) {
                document.getElementById('ofertas-recibidas').innerHTML = `
                    <div class="card" style="border: 2px solid var(--primary)">
                        <p><b>${v.contraoferta.nombre}</b> ofrece <b>$${v.contraoferta.monto}</b></p>
                        <button onclick="aceptarContraoferta()">Aceptar Oferta</button>
                    </div>`;
            }
            
            if(v.estado === "aceptado") { 
                mostrarFichaCompleta(v.conductor); 
                iniciarChat(); 
            }

            if(v.estado === "finalizado") {
                mostrarTicketFinal();
            }
        });
    }

    function aceptarContraoferta() {
        database.ref('viajes_activos/' + tripID).update({ 
            estado: "aceptado", 
            oferta: datosViajeLocal.contraoferta.monto, 
            conductor: datosViajeLocal.contraoferta.datosConductor 
        });
    }

    // --- PANEL CONDUCTOR ---
    function cargarViajesDisponibles() {
        database.ref('viajes_activos').on('value', (snap) => {
            const container = document.getElementById('lista-viajes');
            if(tripID) return; // Si ya tiene un viaje activo, no mostrar lista
            container.innerHTML = "";
            snap.forEach((child) => {
                const v = child.val();
                if(v.estado === "esperando") {
                    container.innerHTML += `
                        <div class="card">
                            <p><b>De:</b> ${v.origen}<br><b>A:</b> ${v.destino}</p>
                            <span class="price-tag">$${v.oferta}</span>
                            <button onclick="aceptarViajeDirecto('${child.key}')">Aceptar</button>
                            <button class="btn-secondary" onclick="hacerContraoferta('${child.key}')">Contraofertar</button>
                        </div>`;
                }
            });
        });
    }

    function aceptarViajeDirecto(id) {
        tripID = id;
        database.ref('viajes_activos/' + id).update({ estado: "aceptado", conductor: conductorLogueado });
        escucharViaje(); // El conductor también escucha cambios
    }

    function hacerContraoferta(id) {
        const monto = prompt("Tu oferta ($):");
        if(monto) {
            tripID = id; // El conductor marca este ID como su viaje actual
            database.ref('viajes_activos/' + id).update({ 
                contraoferta: { nombre: miNombre, monto, datosConductor: conductorLogueado } 
            });
            escucharViaje(); // Espera a que el usuario acepte
            alert("Contraoferta enviada. Espera la confirmación del cliente.");
        }
    }

    // --- CHAT Y VISTAS ---
    function mostrarFichaCompleta(c) {
        changeView('view-active-trip');
        const infoDiv = document.getElementById('info-asignada');
        infoDiv.innerHTML = `
            <div style="text-align:center">
                ${c.foto ? `<img src="${c.foto}" class="img-preview">` : ''}
                <h4>${c.nombre}</h4>
                <p>${c.carro} • <b>${c.placa}</b></p>
                <h2 style="color:green">$${datosViajeLocal.oferta}</h2>
            </div>`;
        
        // El botón de finalizar solo lo ve el conductor
        document.getElementById('btn-finalizar').style.display = (rol === "conductor") ? "block" : "none";
    }

    function iniciarChat() {
        const box = document.getElementById('chat-box');
        database.ref('chats/' + tripID).off(); 
        database.ref('chats/' + tripID).on('child_added', (snap) => {
            const m = snap.val(), clase = (m.rol === rol) ? 'user' : 'driver';
            box.innerHTML += `<div class="msg ${clase}"><b>${m.nombre}:</b><br>${m.texto}</div>`;
            box.scrollTop = box.scrollHeight;
        });
    }

    function enviarMensaje() {
        const input = document.getElementById('chat-input');
        if(input.value) database.ref('chats/' + tripID).push({ nombre: miNombre, rol, texto: input.value });
        input.value = "";
    }

    // --- FINALIZACIÓN ---
    function finalizarViaje() {
        // Marcamos como finalizado en la base de datos
        database.ref('viajes_activos/' + tripID).update({ estado: "finalizado" });
    }

    function mostrarTicketFinal() {
        document.getElementById('t-fecha').innerText = new Date().toLocaleString();
        document.getElementById('t-ruta').innerText = `${datosViajeLocal.origen} ➔ ${datosViajeLocal.destino}`;
        document.getElementById('t-conductor').innerText = "Servicio: " + datosViajeLocal.conductor.nombre;
        document.getElementById('t-precio').innerText = "$" + datosViajeLocal.oferta;
        
        // Limpiamos Firebase después de un momento para que ambos vean el ticket
        setTimeout(() => {
            if(rol === "conductor") {
                database.ref('viajes_activos/' + tripID).remove();
                database.ref('chats/' + tripID).remove();
            }
        }, 2000);

        changeView('view-ticket');
    }
</script>
</body>
</html>
