<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver Santa Ana</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --waze-blue: #3366FF; --dark: #202124; --green: #00D37F; --white: #FFFFFF; --red: #FF4B4B; }
        body { font-family: 'Segoe UI', sans-serif; background: #F2F4F7; margin: 0; color: var(--dark); }
        .card { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin: 15px; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--waze-blue); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .hidden { display: none !important; }
        .btn-cancel { background: var(--red); margin-top: 10px; }
        .btn-outline { background: #E9EDF0; color: var(--dark); margin-top: 10px; }
        .driver-info { border-left: 5px solid var(--green); padding-left: 15px; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 10px; font-size: 12px; background: #eee; margin-bottom: 10px; }
    </style>
</head>
<body onload="checkSession()">

    <div id="app">
        <!-- INICIO -->
        <div id="screen-start" style="text-align:center; padding-top:80px;">
            <h1 style="font-weight: 800; font-size: 32px;">Driver Santa Ana</h1>
            <p style="color: gray;">Transporte rápido y seguro</p>
            <div style="padding: 20px;">
                <button onclick="showScreen('screen-user-form')">PEDIR UN VIAJE</button>
                <button onclick="showScreen('screen-login')" class="btn-outline">MODO CONDUCTOR</button>
            </div>
        </div>

        <!-- LOGIN / REGISTRO (SIN CAMBIOS) -->
        <div id="screen-login" class="hidden">
            <div class="card">
                <h2>Ingreso Conductor</h2>
                <input type="text" id="l-user" placeholder="Usuario">
                <input type="password" id="l-pass" placeholder="Contraseña">
                <button onclick="intentarLogin()">ENTRAR</button>
                <button onclick="showScreen('screen-register')" class="btn-outline">REGISTRARSE</button>
                <button onclick="location.reload()" class="btn-outline">VOLVER</button>
            </div>
        </div>

        <div id="screen-register" class="hidden">
            <div class="card">
                <h2>Registro</h2>
                <input type="text" id="r-nombre" placeholder="Nombre completo">
                <input type="text" id="r-user" placeholder="Usuario">
                <input type="password" id="r-pass" placeholder="Contraseña">
                <input type="text" id="r-placa" placeholder="Placa (P-000)">
                <input type="text" id="r-modelo" placeholder="Modelo y Color">
                <button onclick="registrarConductor()">REGISTRAR</button>
                <button onclick="showScreen('screen-login')" class="btn-outline">CANCELAR</button>
            </div>
        </div>

        <!-- FORMULARIO USUARIO -->
        <div id="screen-user-form" class="hidden">
            <div class="card">
                <h2>¿A dónde vas?</h2>
                <input type="text" id="u-nombre" placeholder="Tu nombre">
                <input type="text" id="u-origen" placeholder="¿Dónde estás? (Ej: Parque Libertad)">
                <input type="text" id="u-destino" placeholder="¿A dónde vas? (Ej: Metrocentro)">
                <input type="number" id="u-oferta" placeholder="Tu oferta $">
                <button onclick="enviarPedido()" style="background:var(--green);">SOLICITAR AHORA</button>
                <button onclick="location.reload()" class="btn-outline">VOLVER</button>
            </div>
        </div>

        <!-- ESPERA USUARIO -->
        <div id="screen-user-wait" class="hidden">
            <div class="card" style="text-align:center;">
                <div id="wait-status">
                    <div class="status-badge">Buscando conductores...</div>
                    <p>Mantén esta pantalla abierta</p>
                </div>
                
                <div id="driver-profile" class="hidden driver-info" style="text-align:left;">
                    <h3 style="color:var(--green);">¡Conductor en camino!</h3>
                    <p><b>Nombre:</b> <span id="view-d-nombre"></span></p>
                    <p><b>Vehículo:</b> <span id="view-d-modelo"></span></p>
                    <p><b>Placa:</b> <span id="view-d-placa"></span></p>
                </div>

                <button onclick="cancelarViajeUsuario()" class="btn-cancel">CANCELAR VIAJE</button>
            </div>
        </div>

        <!-- PANEL CONDUCTOR -->
        <div id="screen-driver" class="hidden">
            <div class="card">
                <p>Hola, <b id="d-label"></b> (En línea)</p>
                <button onclick="cerrarSesion()" style="width:auto; padding:5px 10px; font-size:12px; background:var(--red);">SALIR</button>
            </div>
            <div id="d-pedidos"></div>
            
            <div id="d-activo" class="hidden card">
                <h3 style="color:var(--green);">Viaje aceptado</h3>
                <p id="info-viaje-activo"></p>
                <button onclick="finalizarViaje()" style="background:var(--green);">TERMINAR VIAJE</button>
                <button onclick="cancelarViajeConductor()" class="btn-cancel">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDgIX4jKwyQcfaTSP0QXAdIAR7UzrQMK3g",
            authDomain: "drive-taxi-baad8.firebaseapp.com",
            databaseURL: "https://drive-taxi-baad8-default-rtdb.firebaseio.com",
            projectId: "drive-taxi-baad8",
            storageBucket: "drive-taxi-baad8.firebasestorage.app",
            appId: "1:308551715355:web:e802500e252893be8c86be"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentViajeId = null;

        window.showScreen = (id) => {
            document.querySelectorAll('#app > div').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        // --- LÓGICA USUARIO ---
        window.enviarPedido = () => {
            const nombre = document.getElementById('u-nombre').value;
            const ori = document.getElementById('u-origen').value;
            const des = document.getElementById('u-destino').value;
            const oferta = document.getElementById('u-oferta').value;

            if(!nombre || !ori || !des || !oferta) return alert("Completa todos los campos");

            currentViajeId = "V-" + Date.now();
            db.ref('viajes/' + currentViajeId).set({
                cliente: nombre, origen: ori, destino: des, oferta: oferta, estado: 'buscando'
            });

            showScreen('screen-user-wait');
            
            // Escuchar si alguien acepta
            db.ref('viajes/' + currentViajeId).on('value', snap => {
                const v = snap.val();
                if(!v) return;
                if(v.estado === 'aceptado') {
                    document.getElementById('wait-status').classList.add('hidden');
                    document.getElementById('driver-profile').classList.remove('hidden');
                    document.getElementById('view-d-nombre').innerText = v.conductor;
                    document.getElementById('view-d-modelo').innerText = v.modelo;
                    document.getElementById('view-d-placa').innerText = v.placa;
                }
                if(v.estado === 'cancelado') {
                    alert("El conductor canceló el viaje.");
                    location.reload();
                }
            });
        };

        window.cancelarViajeUsuario = () => {
            if(currentViajeId) db.ref('viajes/' + currentViajeId).remove();
            location.reload();
        };

        // --- LÓGICA CONDUCTOR ---
        window.checkSession = () => {
            const session = localStorage.getItem('driver_data');
            if (session) initDriverPanel(JSON.parse(session));
        };

        window.intentarLogin = () => {
            const user = document.getElementById('l-user').value.toLowerCase();
            const pass = document.getElementById('l-pass').value;
            db.ref('conductores/' + user).once('value', snap => {
                const d = snap.val();
                if(d && d.pass === pass) {
                    localStorage.setItem('driver_data', JSON.stringify(d));
                    initDriverPanel(d);
                } else alert("Error de acceso");
            });
        };

        window.registrarConductor = () => {
            const d = {
                nombre: document.getElementById('r-nombre').value,
                user: document.getElementById('r-user').value.toLowerCase(),
                pass: document.getElementById('r-pass').value,
                placa: document.getElementById('r-placa').value,
                modelo: document.getElementById('r-modelo').value
            };
            db.ref('conductores/' + d.user).set(d).then(() => {
                localStorage.setItem('driver_data', JSON.stringify(d));
                initDriverPanel(d);
            });
        };

        function initDriverPanel(data) {
            showScreen('screen-driver');
            document.getElementById('d-label').innerText = data.nombre;
            
            db.ref('viajes').on('value', snap => {
                const list = document.getElementById('d-pedidos');
                if(!document.getElementById('d-activo').classList.contains('hidden')) return;
                
                list.innerHTML = "";
                snap.forEach(child => {
                    const v = child.val();
                    if(v.estado === 'buscando') {
                        list.innerHTML += `<div class="card">
                            <p>👤 <b>${v.cliente}</b></p>
                            <p>📍 Recoger: ${v.origen}</p>
                            <p>🏁 Destino: ${v.destino}</p>
                            <p style="font-size:20px; color:var(--green);">$${v.oferta}</p>
                            <button onclick="aceptarViaje('${child.key}')">ACEPTAR</button>
                        </div>`;
                    }
                });
            });
        }

        window.aceptarViaje = (id) => {
            const d = JSON.parse(localStorage.getItem('driver_data'));
            currentViajeId = id;
            db.ref('viajes/' + id).update({
                estado: 'aceptado', conductor: d.nombre, placa: d.placa, modelo: d.modelo
            }).then(() => {
                document.getElementById('d-pedidos').innerHTML = "";
                document.getElementById('d-activo').classList.remove('hidden');
                db.ref('viajes/' + id).once('value', s => {
                    const v = s.val();
                    document.getElementById('info-viaje-activo').innerHTML = `Cliente: ${v.cliente}<br>De: ${v.origen}<br>A: ${v.destino}`;
                });
            });
        };

        window.finalizarViaje = () => {
            db.ref('viajes/' + currentViajeId).remove();
            location.reload();
        };

        window.cancelarViajeConductor = () => {
            db.ref('viajes/' + currentViajeId).update({ estado: 'cancelado' });
            setTimeout(() => { db.ref('viajes/' + currentViajeId).remove(); location.reload(); }, 1000);
        };

        window.cerrarSesion = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
