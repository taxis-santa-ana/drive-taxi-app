<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveTaxi - Negociación y Ticket</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #f1c40f; --dark: #2c3e50; --accent: #27ae60; --gray: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding-bottom: 50px; }
        .app { max-width: 450px; margin: auto; background: white; min-height: 100vh; position: relative; }
        .header { background: var(--dark); color: var(--primary); padding: 20px; text-align: center; font-weight: bold; font-size: 1.5rem; }
        .container { padding: 20px; }
        .card { border-radius: 12px; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; background: #fff; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: var(--primary); color: var(--dark); border: none; font-weight: bold; cursor: pointer; }
        .btn-secondary { background: var(--dark); color: white; }
        .hidden { display: none; }
        .price-tag { font-size: 1.8rem; color: var(--accent); font-weight: bold; text-align: center; display: block; }
        #chat-box { height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 10px; background: #f9f9f9; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; border-radius: 15px; margin: 4px 0; max-width: 80%; font-size: 0.9rem; }
        .msg.user { background: var(--primary); align-self: flex-end; }
        .msg.driver { background: #ddd; align-self: flex-start; }
        .img-preview { width: 100%; height: 180px; border-radius: 8px; object-fit: cover; margin-top: 10px; background: #eee; }
        
        /* Estilo del Ticket */
        .ticket { border: 2px dashed #333; padding: 20px; text-align: center; font-family: 'Courier New', Courier, monospace; }
        .ticket h2 { margin: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">DRIVE-TAXI</div>

    <div class="container">
        
        <!-- SELECCIÓN INICIAL -->
        <div id="view-home">
            <button onclick="changeView('view-user-form')">Pedir un Viaje</button>
            <button class="btn-secondary" onclick="changeView('view-driver-reg')">Registrarme como Conductor</button>
            <button class="btn-secondary" style="margin-top:20px; opacity:0.7" onclick="changeView('view-driver-panel')">Panel de Conductores (Login)</button>
        </div>

        <!-- FORMULARIO USUARIO -->
        <div id="view-user-form" class="hidden">
            <h3>Tu solicitud de viaje</h3>
            <input type="text" id="u-nombre" placeholder="¿Cuál es tu nombre?">
            <input type="text" id="u-origen" placeholder="Punto de partida">
            <input type="text" id="u-destino" placeholder="¿A dónde vas?">
            <label>Tu oferta (Base $4.00):</label>
            <input type="number" id="u-oferta" value="4.00" min="4.00">
            <div id="ofertas-recibidas"></div> <!-- Aquí verá las contraofertas -->
            <button onclick="crearViaje()">Solicitar ahora</button>
            <button class="btn-secondary" onclick="changeView('view-home')">Cancelar</button>
        </div>

        <!-- REGISTRO CONDUCTOR -->
        <div id="view-driver-reg" class="hidden">
            <input type="text" id="d-nombre" placeholder="Nombre Completo">
            <input type="text" id="d-carro" placeholder="Vehículo y Color">
            <input type="text" id="d-placa" placeholder="Placa">
            <input type="file" id="d-foto" accept="image/*" capture="environment" onchange="previewImage(this)">
            <img id="preview" class="img-preview hidden">
            <input type="text" id="d-user" placeholder="Usuario">
            <input type="password" id="d-pass" placeholder="Contraseña">
            <button onclick="registrarConductor()">Finalizar Registro</button>
        </div>

        <!-- PANEL DE CONDUCTORES -->
        <div id="view-driver-panel" class="hidden">
            <h3>Viajes Disponibles</h3>
            <div id="lista-viajes"></div>
        </div>

        <!-- VIAJE ACTIVO Y CHAT -->
        <div id="view-active-trip" class="hidden">
            <div id="info-asignada" class="card"></div>
            <div id="chat-box"></div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="chat-input" placeholder="Mensaje...">
                <button style="width:70px" onclick="enviarMensaje()">OK</button>
            </div>
            <button class="btn-secondary" style="margin-top:10px" onclick="finalizarViaje()">Finalizar Viaje y Generar Ticket</button>
        </div>

        <!-- VISTA TICKET FINAL -->
        <div id="view-ticket" class="hidden">
            <div class="ticket card">
                <h2>RECIBO DE VIAJE</h2>
                <p>¡Gracias por viajar!</p>
                <hr>
                <p id="t-fecha"></p>
                <p id="t-ruta" style="font-weight: bold;"></p>
                <p id="t-conductor"></p>
                <p id="t-placa"></p>
                <hr>
                <p style="font-size: 1.2rem;">TOTAL PAGADO:</p>
                <h1 id="t-precio"></h1>
                <button onclick="location.reload()">Nuevo Viaje</button>
            </div>
        </div>

    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://drive-taxi-baad8-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let tripID = null;
    let rol = ""; 
    let miNombre = "";
    let fotoBase64 = "";
    let datosViajeLocal = {};

    function changeView(id) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { fotoBase64 = e.target.result; document.getElementById('preview').src = fotoBase64; document.getElementById('preview').classList.remove('hidden'); }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // --- LÓGICA USUARIO ---
    function crearViaje() {
        miNombre = document.getElementById('u-nombre').value;
        const origen = document.getElementById('u-origen').value;
        const destino = document.getElementById('u-destino').value;
        const oferta = document.getElementById('u-oferta').value;
        if(!miNombre || !origen || !destino) return alert("Completa los datos");

        const ref = database.ref('viajes_activos').push();
        tripID = ref.key;
        rol = "usuario";

        ref.set({ pasajero: miNombre, origen, destino, oferta, estado: "esperando", conductor: null });
        escucharOfertasYEstado();
    }

    function escucharOfertasYEstado() {
        database.ref('viajes_activos/' + tripID).on('value', (snap) => {
            const v = snap.val();
            datosViajeLocal = v;
            if(!v) return;

            // Ver si hay contraofertas del conductor
            if(v.estado === "esperando" && v.contraoferta) {
                const div = document.getElementById('ofertas-recibidas');
                div.innerHTML = `
                    <div class="card" style="border: 2px solid var(--primary)">
                        <p><b>${v.contraoferta.nombre}</b> ofrece llevarte por:</p>
                        <span class="price-tag">$${v.contraoferta.monto}</span>
                        <button onclick="aceptarContraoferta()">Aceptar esta Oferta</button>
                    </div>
                `;
            }

            if(v.estado === "aceptado") {
                mostrarFichaConductor(v.conductor);
                iniciarChat();
            }
        });
    }

    function aceptarContraoferta() {
        database.ref('viajes_activos/' + tripID).update({
            estado: "aceptado",
            oferta: datosViajeLocal.contraoferta.monto,
            conductor: datosViajeLocal.contraoferta.datosConductor
        });
    }

    // --- LÓGICA CONDUCTOR ---
    function registrarConductor() {
        const d = { nombre: document.getElementById('d-nombre').value, carro: document.getElementById('d-carro').value, placa: document.getElementById('d-placa').value, usuario: document.getElementById('d-user').value, pass: document.getElementById('d-pass').value, foto: fotoBase64 };
        database.ref('conductores/' + d.usuario).set(d);
        miNombre = d.nombre;
        rol = "conductor";
        changeView('view-driver-panel');
        cargarViajesDisponibles(d);
    }

    function cargarViajesDisponibles(dConductor) {
        database.ref('viajes_activos').on('value', (snap) => {
            const container = document.getElementById('lista-viajes');
            container.innerHTML = "";
            snap.forEach((child) => {
                const v = child.val();
                if(v.estado === "esperando") {
                    container.innerHTML += `
                        <div class="card">
                            <p><b>Ruta:</b> ${v.origen} → ${v.destino}</p>
                            <span class="price-tag">$${v.oferta}</span>
                            <button onclick="aceptarViajeDirecto('${child.key}', '${dConductor.usuario}')">Aceptar por $${v.oferta}</button>
                            <button class="btn-secondary" onclick="hacerContraoferta('${child.key}', '${dConductor.usuario}')">Contraofertar</button>
                        </div>
                    `;
                }
            });
        });
    }

    function aceptarViajeDirecto(id, userC) {
        database.ref('conductores/' + userC).once('value').then(s => {
            database.ref('viajes_activos/' + id).update({ estado: "aceptado", conductor: s.val() });
            tripID = id; rol = "conductor"; iniciarChat();
        });
    }

    function hacerContraoferta(id, userC) {
        const monto = prompt("¿Cuál es tu contraoferta? (Ej: 6.00)");
        if(!monto || isNaN(monto)) return;
        
        database.ref('conductores/' + userC).once('value').then(s => {
            database.ref('viajes_activos/' + id).update({
                contraoferta: { nombre: s.val().nombre, monto: monto, datosConductor: s.val() }
            });
            alert("Contraoferta enviada. Espera a que el usuario acepte.");
        });
    }

    // --- CHAT Y TICKET ---
    function mostrarFichaConductor(c) {
        changeView('view-active-trip');
        document.getElementById('info-asignada').innerHTML = `
            <h3>Viaje Confirmado</h3>
            <p><b>Piloto:</b> ${c.nombre} | <b>Placa:</b> ${c.placa}</p>
            <p><b>Precio acordado:</b> <span style="color:green; font-weight:bold">$${datosViajeLocal.oferta}</span></p>
        `;
    }

    function iniciarChat() {
        database.ref('chats/' + tripID).on('child_added', (snap) => {
            const m = snap.val();
            const box = document.getElementById('chat-box');
            const clase = (m.rol === rol) ? 'user' : 'driver';
            box.innerHTML += `<div class="msg ${clase}"><b>${m.nombre}:</b><br>${m.texto}</div>`;
            box.scrollTop = box.scrollHeight;
        });
    }

    function enviarMensaje() {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        database.ref('chats/' + tripID).push({ nombre: miNombre, rol: rol, texto: input.value });
        input.value = "";
    }

    function finalizarViaje() {
        // Llenar ticket
        document.getElementById('t-fecha').innerText = new Date().toLocaleString();
        document.getElementById('t-ruta').innerText = `${datosViajeLocal.origen} ➔ ${datosViajeLocal.destino}`;
        document.getElementById('t-conductor').innerText = "Piloto: " + datosViajeLocal.conductor.nombre;
        document.getElementById('t-placa').innerText = "Placa: " + datosViajeLocal.conductor.placa;
        document.getElementById('t-precio').innerText = "$" + datosViajeLocal.oferta;
        
        // Limpiar base de datos del viaje (opcional para no saturar)
        database.ref('viajes_activos/' + tripID).remove();
        
        changeView('view-ticket');
    }
</script>
</body>
</html>
